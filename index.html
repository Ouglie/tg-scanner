<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WMS Терминал</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="text/javascript" src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #f4f4f5);
            color: var(--tg-theme-text-color, #000000);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        h2 { margin-top: 0; font-weight: 600; text-align: center; }
        
        .screen { display: none; width: 100%; max-width: 400px; flex-direction: column; align-items: center; }
        .screen.active { display: flex; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; width: 100%; }
        
        .tile {
            background-color: var(--tg-theme-secondary-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            border-radius: 16px; padding: 25px 15px; text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; user-select: none;
            transition: transform 0.1s ease;
        }
        .tile:active { transform: scale(0.95); }
        .tile .icon { font-size: 32px; margin-bottom: 10px; display: block; }
        .tile .title { font-size: 16px; font-weight: 500; }
        .tile.wide { grid-column: span 2; } 

        #video-container { width: 100%; border-radius: 12px; overflow: hidden; position: relative; background: #000; }
        video { width: 100%; display: block; object-fit: cover; }
        .laser {
            position: absolute; top: 50%; left: 10%; width: 80%; height: 2px;
            background-color: red; box-shadow: 0 0 10px red; transform: translateY(-50%); z-index: 2;
        }

        .back-btn {
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none; border-radius: 10px; padding: 12px 20px;
            font-size: 16px; font-weight: 600; margin-bottom: 20px; width: 100%; cursor: pointer;
        }
        .back-btn:active { opacity: 0.8; }
        .hint { margin-top: 15px; font-size: 14px; opacity: 0.6; text-align: center; }
    </style>
</head>
<body>

    <div id="main-menu-screen" class="screen active">
        <h2>WMS Терминал</h2>
        <div class="grid">
            <div class="tile wide" onclick="startScanner('verifyZO', '🚚 Подтверждение отгрузки')">
                <span class="icon">🚚</span><span class="title">Отгрузка</span>
            </div>
            <div class="tile wide" onclick="startScanner('auth', '🔐 Авторизация')">
                <span class="icon">🔐</span><span class="title">Авторизация по QR</span>
            </div>
            <div class="tile wide" onclick="showScreen('info-menu-screen')">
                <span class="icon">ℹ️</span><span class="title">Информация по ШК</span>
            </div>
        </div>
    </div>

    <div id="info-menu-screen" class="screen">
        <button class="back-btn" onclick="showScreen('main-menu-screen')">⬅️ Назад</button>
        <h2>Информация</h2>
        <div class="grid">
            <div class="tile" onclick="startScanner('bc', '📦 Товар')">
                <span class="icon">📦</span><span class="title">Товар</span>
            </div>
            <div class="tile" onclick="startScanner('sn', '🏷 Серийник')">
                <span class="icon">🏷</span><span class="title">S/N</span>
            </div>
            <div class="tile wide" onclick="startScanner('cell', '🗄 Ячейка')">
                <span class="icon">🗄</span><span class="title">Ячейка</span>
            </div>
        </div>
    </div>

    <div id="scanner-screen" class="screen">
        <button class="back-btn" id="scanner-back-btn">⬅️ Отмена</button>
        <h2 id="scanner-title">Сканер</h2>
        <div id="video-container"><video id="video"></video><div class="laser"></div></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let currentCommandPrefix = "";
        let codeReader = null;
        let lastScannedCode = "";
        let matchCount = 0;
        let pendingCommand = "";

        // Инициализация Биометрии при загрузке приложения
        tg.BiometricManager.init();

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        document.getElementById('scanner-back-btn').addEventListener('click', () => {
            stopScanner();
            showScreen('main-menu-screen');
        });

        function startScanner(cmdType, titleText) {
            showScreen('scanner-screen');
            document.getElementById('scanner-title').innerText = titleText;
            currentCommandPrefix = (cmdType === 'auth' || cmdType === 'verifyZO') ? "" : "/" + cmdType + " ";
            lastScannedCode = "";
            matchCount = 0;

            const hints = new Map();
            hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
                ZXing.BarcodeFormat.QR_CODE, ZXing.BarcodeFormat.CODE_128, 
                ZXing.BarcodeFormat.CODE_39, ZXing.BarcodeFormat.EAN_13
            ]);

            codeReader = new ZXing.BrowserMultiFormatReader(hints);
            codeReader.decodeFromConstraints({ audio: false, video: { facingMode: "environment" } }, 'video', (result) => {
                if (result) {
                    let text = result.text;
                    if (text === lastScannedCode) {
                        matchCount++;
                        if (matchCount >= 2) {
                            processScanResult(cmdType, text);
                        }
                    } else { lastScannedCode = text; matchCount = 0; }
                }
            }).catch(err => console.log(err));
        }

        function processScanResult(cmdType, text) {
            let payload = text;
            if (cmdType === 'auth' || cmdType === 'verifyZO') {
                if (text.includes('start=')) payload = text.split('start=')[1].split('&')[0];
                else if (text.includes(cmdType + '_')) payload = text.substring(text.indexOf(cmdType + '_'));
                pendingCommand = "/start " + payload;
                
                // Для авторизации и отгрузки запрашиваем биометрию
                stopScanner();
                verifyUserWithSystem();
            } else {
                // Для обычного поиска товаров отправляем сразу
                pendingCommand = currentCommandPrefix + text;
                stopScanner();
                finishAuth();
            }
        }

        // --- ЛОГИКА СИСТЕМНОЙ БИОМЕТРИИ ---
        function verifyUserWithSystem() {
            // Если на телефоне вообще есть поддержка биометрии
            if (tg.BiometricManager.isBiometricAvailable) {
                
                // Проверяем, давал ли пользователь разрешение Телеграму использовать биометрию
                if (!tg.BiometricManager.accessGranted) {
                    tg.BiometricManager.requestAccess({ reason: "Для входа в WMS требуется подтверждение личности" }, (accessGranted) => {
                        if (accessGranted) {
                            // Разрешение получено, вызываем само системное окно
                            callSystemAuth();
                        } else {
                            alert("Вы запретили доступ. Авторизация отменена.");
                            showScreen('main-menu-screen');
                        }
                    });
                } else {
                    // Разрешение уже есть, просто вызываем системное окно
                    callSystemAuth();
                }
            } else {
                // Если телефон старый (нет датчиков) или у пользователя не задан ПИН-код на экране блокировки.
                // В этом случае пускаем просто по факту сканирования QR. 
                // Вы можете раскомментировать alert, чтобы запрещать им вход.
                
                // alert("На вашем устройстве не настроена защита экрана. Вход не безопасен.");
                finishAuth(); 
            }
        }

        function callSystemAuth() {
            tg.BiometricManager.authenticate({ reason: "Подтвердите операцию" }, (success) => {
                if (success) {
                    // Лицо/Палец/Системный ПИН подошли!
                    finishAuth();
                } else {
                    // Не узнал лицо и не ввел ПИН (отменил операцию)
                    alert("Проверка не пройдена.");
                    showScreen('main-menu-screen');
                }
            });
        }

        function finishAuth() {
            tg.sendData(pendingCommand);
            tg.close();
        }

        function stopScanner() { if (codeReader) codeReader.reset(); }
    </script>
</body>
</html>
