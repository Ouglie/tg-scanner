<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сканер для 1С</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        #reader {
            width: 100%;
            max-width: 400px;
            margin-top: 20px;
            border: none;
        }
        .hint {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <h2>Складской сканер</h2>
    <div class="hint">Наведите камеру на штрихкод товара</div>
    
    <div id="reader"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Открываем на весь экран

        // Если сканирование успешно
        function onScanSuccess(decodedText, decodedResult) {
            // Формируем команду для бота
            let command = "/bc " + decodedText;
            
            // Отправляем текст в чат (сработает только при открытии через ReplyKeyboard)
            tg.sendData(command);
            
            // Закрываем окно приложения
            tg.close();
        }

        function onScanFailure(error) {
            // Игнорируем ошибки при поиске ШК в кадре
        }

        // Настройки сканера (ограничиваем зону поиска для удобства)
        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader",
            { fps: 10, qrbox: { width: 250, height: 100 } },
            false
        );

        // Запуск
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    </script>
</body>
</html>
