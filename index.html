<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WMS Терминал</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="text/javascript" src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        /* Общие стили для плавного и нативного вида на iOS и Android */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #f4f4f5);
            color: var(--tg-theme-text-color, #000000);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; /* Центрируем контент вертикально на всей странице */
            overflow: hidden; /* Предотвращаем скролл на странице */
        }
        h2 { margin-top: 0; font-weight: 600; text-align: center; }
        
        /* ЭКРАН 1: ГЛАВНОЕ МЕНЮ (Плитки) */
        #menu-screen { width: 100%; max-width: 400px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .tile {
            background-color: var(--tg-theme-secondary-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            border-radius: 16px; padding: 25px 15px; text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; user-select: none;
            transition: transform 0.1s ease;
        }
        .tile:active { transform: scale(0.95); }
        .tile .icon { font-size: 32px; margin-bottom: 10px; display: block; }
        .tile .title { font-size: 16px; font-weight: 500; }
        .tile.wide { grid-column: span 2; } /* Кнопка на всю ширину */

        /* ЭКРАН 2: СКАНЕР */
        #scanner-screen { display: none; width: 100%; max-width: 400px; flex-direction: column; align-items: center; }
        
        /* Кнопка "Отмена" */
        .back-btn {
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none; border-radius: 10px; padding: 12px 20px;
            font-size: 16px; font-weight: 600; margin-bottom: 20px; width: 100%; cursor: pointer;
        }
        .back-btn:active { opacity: 0.8; }

        /* ИСПРАВЛЕНИЕ: КВАДРАТНЫЙ И АВТОМАТИЧЕСКИ ОТЦЕНТРИРОВАННЫЙ ТАРГЕТ */
        #video-container {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1 / 1; /* Жестко задаем форму квадрата для предсказуемости */
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            background: #000;
            margin-top: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15); /* Делаем «красиво» - добавляем тень */

            /* ГЛАВНОЕ ИСПРАВЛЕНИЕ: ПРИМЕНЯЕМ FLEXBOX ДЛЯ ЦЕНТРИРОВАНИЯ contents (red line) */
            display: flex;
            justify-content: center; /* Центрируем горизонтально */
            align-items: center; /* Центрируем вертикально */
        }

        video {
            width: 100%;
            height: 100%; /* Заполняем весь квадратный контейнер */
            object-fit: cover; /* Кадрируем feed камеры, чтобы заполнить квадрат */
            filter: blur(2px); /* Сохраняем размытый эффект с вашего image_1.png */
            z-index: 1;
        }
        
        /* УЛУЧШЕННАЯ КРАСНАЯ ЛИНИЯ-ПРИЦЕЛ (make it pretty) */
        .laser {
            /* УБРАЛИ position: absolute! Больше не нужно с Flexbox-центрированием! */
            width: 80%; /* Сохраняем ширину 80% относительно контейнера */
            height: 3px; /* Сделали линию чуть толще для лучшей видимости */
            background-color: #ff3333; /* Чистый, яркий красный цвет */
            box-shadow: 0 0 15px #ff3333; /* Сделали свечение сильнее для премиального вида */
            z-index: 3; /* Be above the video */
            pointer-events: none; /* Пропускаем клики сквозь линию, на кнопку отмены */
        }
        .hint { margin-top: 15px; font-size: 14px; opacity: 0.6; text-align: center; }
    </style>
</head>
<body>

    <div id="menu-screen">
        <h2>Терминал Сбора Данных</h2>
        <div class="grid">
            <div class="tile" onclick="startScanner('bc', '📦 Скан товара')">
                <span class="icon">📦</span><span class="title">Товар</span>
            </div>
            <div class="tile" onclick="startScanner('sn', '🏷 Скан S/N')">
                <span class="icon">🏷</span><span class="title">Серийник</span>
            </div>
            <div class="tile wide" onclick="startScanner('cell', '🗄 Скан ячейки')">
                <span class="icon">🗄</span><span class="title">Ячейка</span>
            </div>
        </div>
    </div>

    <div id="scanner-screen">
        <button class="back-btn" onclick="stopScanner()">⬅️ Назад в меню</button>
        <h2 id="scanner-title">Сканер</h2>
        <div id="video-container">
            <video id="video"></video>
            <div class="laser"></div>
        </div>
        <div class="hint">Наведите камеру на штрихкод</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let currentCommandPrefix = "";
        let codeReader = null;

        function startScanner(cmdType, titleText) {
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('scanner-screen').style.display = 'flex';
            document.getElementById('scanner-title').innerText = titleText;
            currentCommandPrefix = "/" + cmdType + " ";

            const hints = new Map();
            const formats = [
                ZXing.BarcodeFormat.QR_CODE, 
                ZXing.BarcodeFormat.CODE_128, 
                ZXing.BarcodeFormat.CODE_39,
                ZXing.BarcodeFormat.EAN_13
            ];
            hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, formats);

            codeReader = new ZXing.BrowserMultiFormatReader(hints);

            codeReader.decodeFromConstraints(
                { audio: false, video: { facingMode: "environment" } }, 
                'video', 
                (result, err) => {
                    if (result) {
                        let finalCommand = currentCommandPrefix + result.text;
                        
                        stopScanner();
                        tg.sendData(finalCommand);
                        tg.close();
                    }
                }
            ).catch(err => { console.log(err); });
        }

        function stopScanner() {
            if (codeReader) {
                codeReader.reset();
            }
            document.getElementById('scanner-screen').style.display = 'none';
            document.getElementById('menu-screen').style.display = 'block';
        }
    </script>
</body>
</html>
