<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сканер для 1С</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        #reader { width: 100%; max-width: 400px; margin-top: 20px; border: none; }
        .hint { text-align: center; margin-top: 10px; font-size: 14px; opacity: 0.7; }
    </style>
</head>
<body>

    <h2 id="title">Сканер</h2>
    <div class="hint" id="hint">Наведите камеру на штрихкод</div>
    
    <div id="reader"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 1. Получаем параметр 'cmd' из ссылки
        const urlParams = new URLSearchParams(window.location.search);
        const cmd = urlParams.get('cmd') || 'bc'; // по умолчанию bc, если ничего не передали

        // 2. Настраиваем тексты в зависимости от нажатой кнопки
        let commandPrefix = "";
        if (cmd === 'bc') {
            document.getElementById('title').innerText = "📦 Скан товара";
            commandPrefix = "/bc ";
        } else if (cmd === 'sn') {
            document.getElementById('title').innerText = "🏷 Скан S/N";
            commandPrefix = "/sn ";
        } else if (cmd === 'cell') {
            document.getElementById('title').innerText = "🗄 Скан ячейки";
            commandPrefix = "/cell ";
        }

        // Если сканирование успешно
        function onScanSuccess(decodedText, decodedResult) {
            // Склеиваем префикс команды и штрихкод (например: "/sn 1234567")
            let finalCommand = commandPrefix + decodedText;
            
            tg.sendData(finalCommand);
            tg.close();
        }

        function onScanFailure(error) {}

        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", { fps: 10, qrbox: { width: 250, height: 100 } }, false
        );
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    </script>
</body>
</html>
