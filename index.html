<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS Терминал</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="text/javascript" src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #f4f4f5);
            color: var(--tg-theme-text-color, #000000);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        h2 { margin-top: 0; font-weight: 600; text-align: center; }
        
        /* Экран МЕНЮ */
        #menu-screen { width: 100%; max-width: 400px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .tile {
            background-color: var(--tg-theme-secondary-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            border-radius: 16px; padding: 25px 15px; text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; user-select: none;
            transition: transform 0.1s ease;
        }
        .tile:active { transform: scale(0.95); }
        .tile .icon { font-size: 32px; margin-bottom: 10px; display: block; }
        .tile .title { font-size: 16px; font-weight: 500; }
        .tile.wide { grid-column: span 2; }

        /* Экран СКАНЕРА */
        #scanner-screen { display: none; width: 100%; max-width: 400px; flex-direction: column; align-items: center; }
        #video-container { width: 100%; border-radius: 12px; overflow: hidden; position: relative; background: #000; }
        video { width: 100%; display: block; object-fit: cover; }
        
        /* Красная линия прицела */
        .laser {
            position: absolute; top: 50%; left: 10%; width: 80%; height: 2px;
            background-color: red; box-shadow: 0 0 10px red; transform: translateY(-50%);
            z-index: 2;
        }

        .back-btn {
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none; border-radius: 10px; padding: 12px 20px;
            font-size: 16px; font-weight: 600; margin-bottom: 20px; width: 100%; cursor: pointer;
        }
        .back-btn:active { opacity: 0.8; }
    </style>
</head>
<body>

    <div id="menu-screen">
        <h2>Терминал Сбора Данных</h2>
        <div class="grid">
            <div class="tile" onclick="startScanner('bc', '📦 Скан товара')">
                <span class="icon">📦</span><span class="title">Товар</span>
            </div>
            <div class="tile" onclick="startScanner('sn', '🏷 Скан S/N')">
                <span class="icon">🏷</span><span class="title">Серийник</span>
            </div>
            <div class="tile wide" onclick="startScanner('cell', '🗄 Скан ячейки')">
                <span class="icon">🗄</span><span class="title">Ячейка</span>
            </div>
        </div>
    </div>

    <div id="scanner-screen">
        <button class="back-btn" onclick="stopScanner()">⬅️ Назад в меню</button>
        <h2 id="scanner-title">Сканер</h2>
        <div id="video-container">
            <video id="video"></video>
            <div class="laser"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let currentCommandPrefix = "";
        let codeReader = null;

        function startScanner(cmdType, titleText) {
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('scanner-screen').style.display = 'flex';
            document.getElementById('scanner-title').innerText = titleText;
            currentCommandPrefix = "/" + cmdType + " ";

            // Ускоряем ZXing: жестко задаем форматы для поиска
            const hints = new Map();
            const formats = [
                ZXing.BarcodeFormat.QR_CODE, 
                ZXing.BarcodeFormat.CODE_128, 
                ZXing.BarcodeFormat.CODE_39,
                ZXing.BarcodeFormat.EAN_13 // Добавили поддержку стандартных товарных штрихкодов
            ];
            hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, formats);

            // Инициализируем ZXing
            codeReader = new ZXing.BrowserMultiFormatReader(hints);

            // Запускаем камеру
            codeReader.decodeFromConstraints(
                { audio: false, video: { facingMode: "environment" } }, 
                'video', 
                (result, err) => {
                    if (result) {
                        // Как только поймали код - формируем команду
                        let finalCommand = currentCommandPrefix + result.text;
                        
                        // Останавливаем камеру
                        stopScanner();
                        
                        // Отправляем в 1С и закрываем Mini App
                        tg.sendData(finalCommand);
                        tg.close();
                    }
                }
            ).catch(err => {
                alert("Ошибка камеры: " + err);
            });
        }

        function stopScanner() {
            if (codeReader) {
                codeReader.reset(); // Выключаем использование камеры
            }
            document.getElementById('scanner-screen').style.display = 'none';
            document.getElementById('menu-screen').style.display = 'block';
        }
    </script>
</body>
</html>
