<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS Терминал</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="text/javascript" src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #f4f4f5);
            color: var(--tg-theme-text-color, #000000);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        h2 { margin-top: 0; font-weight: 600; text-align: center; }
        
        .screen { display: none; width: 100%; max-width: 400px; flex-direction: column; align-items: center; }
        .screen.active { display: flex; } /* Класс для показа активного экрана */

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; width: 100%; }
        
        .tile {
            background-color: var(--tg-theme-secondary-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            border-radius: 16px; padding: 25px 15px; text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; user-select: none;
            transition: transform 0.1s ease;
        }
        .tile:active { transform: scale(0.95); }
        .tile .icon { font-size: 32px; margin-bottom: 10px; display: block; }
        .tile .title { font-size: 16px; font-weight: 500; }
        .tile.wide { grid-column: span 2; } /* Широкая кнопка на 2 колонки */

        /* Блок видео */
        #video-container { width: 100%; border-radius: 12px; overflow: hidden; position: relative; background: #000; }
        video { width: 100%; display: block; object-fit: cover; }
        .laser {
            position: absolute; top: 50%; left: 10%; width: 80%; height: 2px;
            background-color: red; box-shadow: 0 0 10px red; transform: translateY(-50%); z-index: 2;
        }

        .back-btn {
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none; border-radius: 10px; padding: 12px 20px;
            font-size: 16px; font-weight: 600; margin-bottom: 20px; width: 100%; cursor: pointer;
        }
        .back-btn:active { opacity: 0.8; }
        .hint { margin-top: 15px; font-size: 14px; opacity: 0.6; text-align: center; }
    </style>
</head>
<body>

    <div id="main-menu-screen" class="screen active">
        <h2>Главное меню</h2>
        <div class="grid">
            <div class="tile wide" onclick="startScanner('auth', '🔐 Авторизация')">
                <span class="icon">🔐</span><span class="title">Авторизация по QR</span>
            </div>
            <div class="tile wide" onclick="showScreen('info-menu-screen')">
                <span class="icon">ℹ️</span><span class="title">Информация по ШК</span>
            </div>
        </div>
    </div>

    <div id="info-menu-screen" class="screen">
        <button class="back-btn" onclick="showScreen('main-menu-screen')">⬅️ Назад в меню</button>
        <h2>Информация по ШК</h2>
        <div class="grid">
            <div class="tile" onclick="startScanner('bc', '📦 Скан товара')">
                <span class="icon">📦</span><span class="title">Товар</span>
            </div>
            <div class="tile" onclick="startScanner('sn', '🏷 Скан S/N')">
                <span class="icon">🏷</span><span class="title">Серийник</span>
            </div>
            <div class="tile wide" onclick="startScanner('cell', '🗄 Скан ячейки')">
                <span class="icon">🗄</span><span class="title">Ячейка</span>
            </div>
        </div>
    </div>

    <div id="scanner-screen" class="screen">
        <button class="back-btn" id="scanner-back-btn">⬅️ Отмена</button>
        <h2 id="scanner-title">Сканер</h2>
        <div id="video-container">
            <video id="video"></video>
            <div class="laser"></div>
        </div>
        <div class="hint">Наведите камеру на код</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let currentCommandPrefix = "";
        let codeReader = null;
        let lastScannedCode = "";
        let matchCount = 0;
        const REQUIRED_MATCHES = 2; 

        // Функция переключения экранов
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // Кнопка "Назад" из сканера
        document.getElementById('scanner-back-btn').addEventListener('click', () => {
            stopScanner();
            showScreen('main-menu-screen');
        });

        function startScanner(cmdType, titleText) {
            showScreen('scanner-screen');
            document.getElementById('scanner-title').innerText = titleText;
            
            // Если это авторизация, префикс не нужен, мы соберем команду руками.
            // Иначе используем стандартные префиксы
            currentCommandPrefix = (cmdType === 'auth') ? "" : "/" + cmdType + " ";

            lastScannedCode = "";
            matchCount = 0;

            const hints = new Map();
            const formats = [
                ZXing.BarcodeFormat.QR_CODE, 
                ZXing.BarcodeFormat.CODE_128, 
                ZXing.BarcodeFormat.CODE_39,
                ZXing.BarcodeFormat.EAN_13
            ];
            hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, formats);

            codeReader = new ZXing.BrowserMultiFormatReader(hints);

            codeReader.decodeFromConstraints(
                { audio: false, video: { facingMode: "environment" } }, 
                'video', 
                (result, err) => {
                    if (result) {
                        let text = result.text;
                        
                        if (text === lastScannedCode) {
                            matchCount++;
                            if (matchCount >= REQUIRED_MATCHES) {
                                
                                let finalCommand = "";
                                
                                // --- ЛОГИКА ДЛЯ АВТОРИЗАЦИИ (ПАРСИНГ DEEPLINK) ---
                                if (cmdType === 'auth') {
                                    let payload = text;
                                    // Если в QR зашита ссылка t.me/.../?start=auth_123
                                    if (text.includes('start=')) {
                                        payload = text.split('start=')[1].split('&')[0];
                                    } 
                                    // Если там просто текст auth_123
                                    else if (text.includes('auth_')) {
                                        payload = text.substring(text.indexOf('auth_'));
                                    }
                                    finalCommand = "/start " + payload;
                                } 
                                // --- ЛОГИКА ДЛЯ ОБЫЧНЫХ ШТРИХКОДОВ ---
                                else {
                                    finalCommand = currentCommandPrefix + text;
                                }
                                
                                stopScanner();
                                tg.sendData(finalCommand);
                                tg.close();
                            }
                        } else {
                            lastScannedCode = text;
                            matchCount = 0;
                        }
                    }
                }
            ).catch(err => { console.log(err); });
        }

        function stopScanner() {
            if (codeReader) {
                codeReader.reset();
            }
        }
    </script>
</body>
</html>
