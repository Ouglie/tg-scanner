<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spark WMS Терминал</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script type="text/javascript" src="https://unpkg.com/@zxing/library@latest"></script>
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="app-header">
        <div class="logo-container">
            <img src="assets/logo.png" alt="Spark WMS" class="logo-image">
        </div>
    </header>

    <div id="main-menu-screen" class="screen active">
        <h2>ГЛАВНОЕ МЕНЮ</h2>
        <div class="grid">
            <div class="tile wide" onclick="startScanner('verifyZO', '🚚 Подтверждение отгрузки')">
                <span class="icon">🚚</span><span class="title">Отгрузка</span>
            </div>
            <div class="tile wide" onclick="startScanner('auth', '🔐 Авторизация')">
                <span class="icon">🔐</span><span class="title">Авторизация по QR</span>
            </div>
            <div class="tile wide" onclick="showScreen('info-menu-screen')">
                <span class="icon">ℹ️</span><span class="title">Информация</span>
            </div>
        </div>
    </div>

    <div id="info-menu-screen" class="screen">
        <button class="back-btn" onclick="showScreen('main-menu-screen')">⬅️ Назад в меню</button>
        <h2>Информация</h2>
        <div class="grid">
            <div class="tile" onclick="startScanner('bc', '📦 Товар')">
                <span class="icon">📦</span><span class="title">Товар</span>
            </div>
            <div class="tile" onclick="startScanner('sn', '🏷 Серийник')">
                <span class="icon">🏷</span><span class="title">S/N</span>
            </div>
            <div class="tile wide" onclick="startScanner('cell', '🗄 Ячейка')">
                <span class="icon">🗄</span><span class="title">Ячейка</span>
            </div>
        </div>
    </div>

    <div id="scanner-screen" class="screen">
        <button class="back-btn" id="scanner-back-btn">⬅️ Отмена</button>
        <h2 id="scanner-title">Сканер</h2>
        <div id="video-container">
            <video id="video"></video>
            <div class="laser"></div>
        </div>
        <div class="hint">Наведите камеру на штрихкод</div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
